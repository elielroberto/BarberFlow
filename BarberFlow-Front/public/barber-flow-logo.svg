<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="1200" fill="#050505"/>

  <!-- Outer rings -->
  <circle cx="600" cy="600" r="430" stroke="#D4AF37" stroke-width="10" fill="none"/>
  <circle cx="600" cy="600" r="470" stroke="#D4AF37" stroke-width="6" fill="none" opacity="0.9"/>

  <!-- Top arch accents -->
  <path d="M240 360 C340 180, 860 180, 960 360" stroke="#D4AF37" stroke-width="6" fill="none" opacity="0.9"/>
  <path d="M290 365 C375 230, 825 230, 910 365" stroke="#D4AF37" stroke-width="3" fill="none" opacity="0.8"/>

  <!-- Barber pole -->
  <g transform="translate(0,-10)">
    <rect x="545" y="220" width="110" height="260" rx="16" fill="#111111" stroke="#F4F4F4" stroke-width="4"/>
    <rect x="530" y="480" width="140" height="28" rx="8" fill="#C9A24A" stroke="#E8D18D" stroke-width="2"/>
    <rect x="530" y="192" width="140" height="28" rx="8" fill="#C9A24A" stroke="#E8D18D" stroke-width="2"/>
    <ellipse cx="600" cy="180" rx="45" ry="34" fill="#C9A24A" stroke="#E8D18D" stroke-width="2"/>
    <path d="M550 240 L610 240 L650 290 L590 290 Z" fill="#163A63"/>
    <path d="M545 285 L605 285 L655 335 L595 335 Z" fill="#FFFFFF"/>
    <path d="M540 330 L600 330 L650 380 L590 380 Z" fill="#B5232D"/>
    <path d="M545 375 L605 375 L655 425 L595 425 Z" fill="#FFFFFF"/>
    <path d="M550 420 L610 420 L650 470 L590 470 Z" fill="#163A63"/>
  </g>

  <!-- Left scissors -->
  <g transform="translate(350 330) rotate(-12)">
    <circle cx="0" cy="80" r="24" stroke="#D4AF37" stroke-width="6" fill="none"/>
    <circle cx="52" cy="98" r="24" stroke="#D4AF37" stroke-width="6" fill="none"/>
    <line x1="18" y1="63" x2="122" y2="-40" stroke="#E9D9A8" stroke-width="8" stroke-linecap="round"/>
    <line x1="35" y1="71" x2="135" y2="5" stroke="#E9D9A8" stroke-width="8" stroke-linecap="round"/>
    <circle cx="44" cy="73" r="7" fill="#D4AF37"/>
  </g>

  <!-- Right razor -->
  <g transform="translate(790 350) rotate(15)">
    <path d="M0 10 L85 10 L105 35 L20 35 Z" fill="#D4AF37"/>
    <path d="M20 35 L160 70" stroke="#E9D9A8" stroke-width="8" stroke-linecap="round"/>
    <path d="M160 70 Q195 86 200 110 Q168 113 140 98 Z" fill="#0D0D0D" stroke="#E9D9A8" stroke-width="3"/>
  </g>

  <!-- Side ornaments -->
  <path d="M95 640 L150 630 L135 645 L150 660 Z" fill="#D4AF37"/>
  <path d="M1105 640 L1050 630 L1065 645 L1050 660 Z" fill="#D4AF37"/>

  <!-- Main title -->
  <text x="600" y="760"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="220"
        font-weight="700"
        text-anchor="middle"
        fill="#F4F0E8"
        letter-spacing="6">BARBER</text>

  <!-- Subtitle -->
  <text x="600" y="885"
        font-family="'Brush Script MT', 'Segoe Script', cursive"
        font-size="165"
        font-weight="700"
        text-anchor="middle"
        fill="#D4AF37">Flow</text>

  <!-- Bottom beard icon -->
  <g transform="translate(600 985)">
    <path d="M-38 -10 Q-28 -48 0 -50 Q28 -48 38 -10 L35 18 Q20 50 0 62 Q-20 50 -35 18 Z" fill="#D4AF37"/>
    <path d="M-24 -8 Q0 18 24 -8" stroke="#050505" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M-18 14 Q-28 4 -38 16" stroke="#050505" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M18 14 Q28 4 38 16" stroke="#050505" stroke-width="7" fill="none" stroke-linecap="round"/>
    <rect x="-9" y="-34" width="18" height="16" rx="4" fill="#050505"/>
  </g>
</svg>
