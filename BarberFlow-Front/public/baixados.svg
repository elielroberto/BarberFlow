<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200">
  <!-- Top -->
  <rect x="30" y="5" width="40" height="15" rx="5" fill="#555"></rect>
  <circle cx="50" cy="5" r="5" fill="#777"></circle>

  <!-- Pole -->
  <rect x="30" y="20" width="40" height="140" rx="10" fill="#ffffff"></rect>

  <!-- Stripes -->
  <g stroke-width="12">
    <line x1="25" y1="30" x2="75" y2="60" stroke="#ef4444"></line>
    <line x1="25" y1="60" x2="75" y2="90" stroke="#3b82f6"></line>
    <line x1="25" y1="90" x2="75" y2="120" stroke="#ef4444"></line>
    <line x1="25" y1="120" x2="75" y2="150" stroke="#3b82f6"></line>
  </g>

  <!-- Bottom -->
  <rect x="30" y="160" width="40" height="15" rx="5" fill="#555"></rect>
  <circle cx="50" cy="180" r="5" fill="#777"></circle>
</svg>